defaults:
  - db: credentials
  - schema: policy-schema
  - agent: iql
  - _self_

run: 0
db_prefix: lingwei
db_name: unifloral
seed: 0
dataset: halfcheetah-medium-v2
num_updates: 1000000
eval_interval: 2500
eval_workers: 8
eval_final_episodes: 1000
log: false
wandb_project: unifloral
wandb_team: flair
wandb_group: debug

# Fallback agent defaults. Each agent config overrides these with its known-good
# algorithm recipe; keep run/eval/logging fields above for global control.
lr: 1e-3
actor_lr: 1e-3
lr_schedule: constant
batch_size: 1024
gamma: 0.99
polyak_step_size: 0.005
norm_obs: true
actor_num_layers: 3
actor_layer_width: 256
actor_ln: true
deterministic: false
deterministic_eval: false
use_tanh_mean: true
use_log_std_param: false
critic_num_layers: 3
critic_layer_width: 256
critic_ln: true
log_std_min: -5.0
log_std_max: 2.0
use_q_target_in_actor: false
use_value_target: false
value_expectile: 0.7
awr_exp_adv_clip: 100.0
ent_coef_init: 1.0
num_critics: 2
actor_bc_coef: 0.0
actor_q_coef: 1.0
normalize_q_loss: false
aggregate_q: min
use_awr: false
awr_temperature: 1.0
num_critic_updates_per_step: 1
critic_bc_coef: 0.0
diversity_coef: 0.0
policy_noise: 0.0
noise_clip: 0.0
use_target_actor: false
use_entropy_loss: false
actor_entropy_coef: 0.0
critic_entropy_coef: 0.0
model_path: ""
dataset_sample_ratio: 1.0
rollout_interval: 1000
rollout_length: 5
rollout_batch_size: 50000
model_retain_epochs: 5
step_penalty_coef: 0.5

hydra:
  mode: MULTIRUN
  job:
    chdir: false
  sweeper:
    params:
      seed: range(0,5)
      dataset: halfcheetah-medium-expert-v2, halfcheetah-medium-replay-v2, walker2d-medium-expert-v2, walker2d-medium-replay-v2, hopper-medium-replay-v2, hopper-medium-expert-v2   
      agent: iql
